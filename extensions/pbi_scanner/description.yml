docs:
  extended_description: |
    Query Power BI Semantic Models from DuckDB using DAX/XMLA.

    `dax_query` executes DAX and returns results as DuckDB tables. `pbi_tables`, `pbi_columns`, `pbi_measures`, and `pbi_relationships` expose INFO.VIEW metadata for model exploration.

    The easiest way to get started is Azure CLI auth (`az login`) with `SET pbi_scanner_auth_mode = 'azure_cli'`, but Azure CLI is not required.

    You can also authenticate with DuckDB Azure secrets from the `azure` extension, either by:
    - setting `Secret=<name>` in the connection string, or
    - passing `secret_name := '<name>'` as a named parameter.

    Replace workspace and semantic model placeholders with values you can access.
  hello_world: |
    INSTALL pbi_scanner FROM community;
    LOAD pbi_scanner;
    SET pbi_scanner_auth_mode = 'azure_cli';

    SELECT *
    FROM dax_query(
        'Data Source=powerbi://api.powerbi.com/v1.0/myorg/Example%20Workspace;Initial Catalog=example_semantic_model;',
        'TOPN(500, FactSales)'
    );

extension:
  name: pbi_scanner
  description: DuckDB extension for querying Power BI Semantic Models with DAX.
  version: '0.0.3'
  language: C++
  build: cmake
  license: MIT
  excluded_platforms: "wasm_mvp;wasm_eh;wasm_threads;windows_amd64_mingw;osx_amd64"
  maintainers:
